<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="Inter,Arial,sans-serif">
  <style>
    .lbl{font-size:15px;font-weight:600;fill:#1A2332}
    .sub{font-size:12.5px;fill:#6B7A99}
    .num{font-size:13px;font-weight:700;fill:#fff}
    .ln{stroke:#00B4CC;stroke-width:1.6;fill:none}
  </style>
  <!-- muis -->
  <g transform="translate(70,60)">
    <rect x="0" y="0" width="140" height="200" rx="70" fill="#F0F4F8" stroke="#0A2342" stroke-width="2.5"/>
    <line x1="70" y1="2" x2="70" y2="78" stroke="#0A2342" stroke-width="2"/>
    <path d="M2 70 a68 68 0 0 1 136 0" fill="none" stroke="#0A2342" stroke-width="2"/>
    <!-- wiel -->
    <rect x="61" y="26" width="18" height="34" rx="9" fill="#00B4CC" stroke="#0A2342" stroke-width="1.5"/>
    <!-- knop-accenten -->
    <path d="M3 68 a67 67 0 0 1 55 -64 v64 z" fill="rgba(0,180,204,.12)"/>
    <path d="M137 68 a67 67 0 0 0 -55 -64 v64 z" fill="rgba(255,107,53,.12)"/>
  </g>
  <!-- 1 roteren (links) -->
  <circle cx="250" cy="55" r="11" fill="#00B4CC"/><text class="num" x="250" y="60" text-anchor="middle">1</text>
  <path class="ln" d="M120 95 C180 80 215 62 239 57"/>
  <text class="lbl" x="270" y="52">Linkerknop ingedrukt → Roteren</text>
  <text class="sub" x="270" y="71">sleep om rond je model te draaien</text>
  <!-- 2 pannen (rechts) -->
  <circle cx="250" cy="120" r="11" fill="#FF6B35"/><text class="num" x="250" y="125" text-anchor="middle">2</text>
  <path class="ln" d="M205 95 C220 95 232 122 239 122" stroke="#FF6B35"/>
  <text class="lbl" x="270" y="117">Rechterknop ingedrukt → Pannen</text>
  <text class="sub" x="270" y="136">sleep om het beeld te verschuiven</text>
  <!-- 3 zoomen (wiel) -->
  <circle cx="250" cy="185" r="11" fill="#0A2342"/><text class="num" x="250" y="190" text-anchor="middle">3</text>
  <path class="ln" d="M150 100 C190 150 220 182 239 186" stroke="#0A2342"/>
  <text class="lbl" x="270" y="182">Wiel draaien → Zoomen</text>
  <text class="sub" x="270" y="201">in- en uitzoomen</text>
  <!-- 4 rotatiecentrum -->
  <circle cx="250" cy="250" r="11" fill="#22C55E"/><text class="num" x="250" y="255" text-anchor="middle">4</text>
  <path class="ln" d="M150 105 C200 200 225 246 239 250" stroke="#22C55E"/>
  <text class="lbl" x="270" y="247">Wielklik op een hoekpunt → Rotatiecentrum</text>
  <text class="sub" x="270" y="266">bepaalt waarrond je draait</text>
  <text class="sub" x="70" y="300">FreeCAD — navigatiestijl: Gesture</text>
</svg>
