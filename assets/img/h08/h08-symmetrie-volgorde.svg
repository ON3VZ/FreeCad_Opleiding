<svg viewBox="0 0 600 210" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#00B4CC"/></marker>
  </defs>
  <style>
    .ref{stroke:#c9d4de;stroke-width:1.5;}
    .axis{stroke:#00B4CC;stroke-width:2.4;stroke-dasharray:7 5;}
    .pt{fill:#00B4CC;stroke:#06303a;stroke-width:1.5;}
    .num{fill:#fff;font-size:14px;font-weight:700;}
    .nc{fill:#FF6B35;}
    .ncb{fill:#00B4CC;}
    .lab{fill:#0B2138;font-size:13px;}
    .key{fill:#0B2138;font-size:13px;font-weight:700;}
  </style>
  <!-- horizontal reference line -->
  <line class="ref" x1="70" y1="115" x2="470" y2="115"/>
  <!-- vertical symmetry axis -->
  <line class="axis" x1="270" y1="35" x2="270" y2="185"/>
  <text class="lab" x="270" y="200" text-anchor="middle">symmetrie-as (bv. Y-as)</text>
  <!-- left point ① -->
  <circle class="pt" cx="150" cy="115" r="7"/>
  <circle class="ncb" cx="150" cy="88" r="13"/><text class="num" x="150" y="93" text-anchor="middle">1</text>
  <!-- right point ② -->
  <circle class="pt" cx="390" cy="115" r="7"/>
  <circle class="ncb" cx="390" cy="88" r="13"/><text class="num" x="390" y="93" text-anchor="middle">2</text>
  <!-- axis ③ -->
  <circle class="ncb" cx="270" cy="50" r="13"/><text class="num" x="270" y="55" text-anchor="middle">3</text>
  <!-- result arrows: both points snap symmetric -->
  <line x1="180" y1="140" x2="250" y2="140" stroke="#00B4CC" stroke-width="1.4" marker-end="url(#a2)"/>
  <line x1="360" y1="140" x2="290" y2="140" stroke="#00B4CC" stroke-width="1.4" marker-end="url(#a2)"/>
  <!-- step 4: press S -->
  <rect x="430" y="40" width="150" height="40" rx="8" fill="#FF6B35"/>
  <circle class="nc" cx="430" cy="40" r="0"/>
  <text class="num" x="448" y="64" font-size="15" fill="#fff">4</text>
  <text x="468" y="65" font-size="15" font-weight="700" fill="#fff">druk&#160;S</text>
  <text class="key" x="505" y="100" text-anchor="middle" font-size="11" fill="#43586b">(of symmetrie-knop)</text>
</svg>
