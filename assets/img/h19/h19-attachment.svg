<svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <defs><marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#43586b"/></marker></defs>
  <style>.h{font-size:14px;font-weight:700;}.t{font-size:12.5px;fill:#0B2138;}.chip{font-family:'JetBrains Mono',monospace;font-size:12px;}.bad{fill:#c0392b;font-weight:700;}.good{fill:#1a8f4a;font-weight:700;}.arr{stroke:#43586b;stroke-width:1.4;}</style>
  <!-- left: face (fragile) -->
  <rect x="16" y="16" width="296" height="268" rx="10" fill="#fdf1ef" stroke="#e2b8b0"/>
  <text class="h" x="34" y="44" fill="#c0392b">✗ Schets aan een modelface</text>
  <rect x="40" y="60" width="248" height="34" rx="6" fill="#fff" stroke="#d8c2bd"/><text class="t" x="52" y="82">afronding verwijst naar <tspan class="chip">Face6</tspan></text>
  <line class="arr" x1="164" y1="98" x2="164" y2="122" marker-end="url(#ar)"/>
  <text class="t" x="164" y="116" text-anchor="middle" font-style="italic">je bewerkt een eerdere stap</text>
  <rect x="40" y="128" width="248" height="34" rx="6" fill="#fff" stroke="#d8c2bd"/><text class="t" x="52" y="150">de face hernummert: <tspan class="chip">Face6 → Face9</tspan></text>
  <line class="arr" x1="164" y1="166" x2="164" y2="190" marker-end="url(#ar)"/>
  <rect x="40" y="196" width="248" height="40" rx="6" fill="#fbe3df" stroke="#e2b8b0"/><text class="bad" x="52" y="221">✗ verwijzing kwijt → fout in de boom</text>
  <!-- right: datum (robust) -->
  <rect x="328" y="16" width="296" height="268" rx="10" fill="#eafaf2" stroke="#a9dcc3"/>
  <text class="h" x="346" y="44" fill="#1a8f4a">✓ Schets aan een referentievlak</text>
  <rect x="352" y="60" width="248" height="34" rx="6" fill="#fff" stroke="#bfe3d2"/><text class="t" x="364" y="82">schets verwijst naar <tspan class="chip">XY-vlak</tspan></text>
  <line class="arr" x1="476" y1="98" x2="476" y2="122" marker-end="url(#ar)"/>
  <text class="t" x="476" y="116" text-anchor="middle" font-style="italic">je bewerkt een eerdere stap</text>
  <rect x="352" y="128" width="248" height="34" rx="6" fill="#fff" stroke="#bfe3d2"/><text class="t" x="364" y="150">het <tspan class="chip">XY-vlak</tspan> blijft het XY-vlak</text>
  <line class="arr" x1="476" y1="166" x2="476" y2="190" marker-end="url(#ar)"/>
  <rect x="352" y="196" width="248" height="40" rx="6" fill="#d8f3e6" stroke="#a9dcc3"/><text class="good" x="364" y="221">✓ verwijzing blijft kloppen</text>
  <text class="t" x="320" y="270" text-anchor="middle" fill="#43586b" font-size="11.5">Oorsprongsvlakken (XY/XZ/YZ) en eigen referentievlakken hebben een vaste naam.</text>
</svg>
