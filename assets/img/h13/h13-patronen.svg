<svg viewBox="0 0 840 300" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00B4CC"/>
    </marker>
  </defs>
  <style>
    .plate{fill:#EAF6F8;stroke:#0B2138;stroke-width:2;}
    .seed{fill:#00B4CC;stroke:#06303a;stroke-width:1.5;}
    .copy{fill:#FFFFFF;stroke:#0B2138;stroke-width:1.5;}
    .axis{stroke:#00B4CC;stroke-width:2;stroke-dasharray:6 5;}
    .lab{fill:#0B2138;font-size:15px;font-weight:700;}
    .num{fill:#FFFFFF;font-size:14px;font-weight:700;}
    .nc{fill:#00B4CC;}
    .gu{stroke:#00B4CC;stroke-width:1.6;fill:none;}
  </style>

  <!-- ===== 1. LINEAIR ===== -->
  <circle class="nc" cx="22" cy="24" r="12"/><text class="num" x="22" y="29" text-anchor="middle">1</text>
  <text class="lab" x="42" y="29">Lineair</text>
  <rect class="plate" x="20" y="70" width="230" height="80" rx="8"/>
  <rect class="seed" x="34" y="92" width="20" height="36" rx="4"/>
  <rect class="copy" x="82" y="92" width="20" height="36" rx="4"/>
  <rect class="copy" x="130" y="92" width="20" height="36" rx="4"/>
  <rect class="copy" x="178" y="92" width="20" height="36" rx="4"/>
  <rect class="copy" x="216" y="92" width="20" height="36" rx="4"/>
  <line class="gu" x1="44" y1="172" x2="226" y2="172" marker-end="url(#ar)"/>
  <text class="lab" x="135" y="196" text-anchor="middle" font-size="12" font-weight="400" fill="#43586b">aantal × afstand</text>

  <!-- ===== 2. POLAIR ===== -->
  <circle class="nc" cx="312" cy="24" r="12"/><text class="num" x="312" y="29" text-anchor="middle">2</text>
  <text class="lab" x="332" y="29">Polair</text>
  <circle class="plate" cx="425" cy="135" r="78"/>
  <circle cx="425" cy="135" r="3" fill="#0B2138"/>
  <!-- 6 holes around radius 52 -->
  <circle class="seed" cx="425" cy="83" r="11"/>
  <circle class="copy" cx="470" cy="109" r="11"/>
  <circle class="copy" cx="470" cy="161" r="11"/>
  <circle class="copy" cx="425" cy="187" r="11"/>
  <circle class="copy" cx="380" cy="161" r="11"/>
  <circle class="copy" cx="380" cy="109" r="11"/>
  <path class="gu" d="M464,72 A70,70 0 0,1 489,108" marker-end="url(#ar)"/>
  <text class="lab" x="425" y="240" text-anchor="middle" font-size="12" font-weight="400" fill="#43586b">aantal × hoek (360°)</text>

  <!-- ===== 3. SPIEGELEN ===== -->
  <circle class="nc" cx="565" cy="24" r="12"/><text class="num" x="565" y="29" text-anchor="middle">3</text>
  <text class="lab" x="585" y="29">Spiegelen</text>
  <line class="axis" x1="700" y1="62" x2="700" y2="208"/>
  <text class="lab" x="700" y="226" text-anchor="middle" font-size="11" font-weight="400" fill="#00B4CC">spiegelvlak / as</text>
  <!-- seed left: plate with a notch -->
  <path class="seed" d="M610,95 h70 v70 h-70 v-22 h22 v-26 h-22 Z"/>
  <!-- mirrored right -->
  <path class="copy" d="M790,95 h-70 v70 h70 v-22 h-22 v-26 h22 Z"/>
  <line class="gu" x1="686" y1="130" x2="660" y2="130" marker-end="url(#ar)"/>
  <line class="gu" x1="714" y1="130" x2="740" y2="130" marker-end="url(#ar)"/>
</svg>
